<!DOCTYPE html>
<html lang="es">
<head>
    <title>Visor Táctico | Firelink</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <link type="text/css" rel="stylesheet" href="./assets/css/main.css">
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        
        <header id="header-hud">
            <h1 class="shrine-title">El Vigía Errante</h1>
            <div class="shrine-divider-center"></div>
            <p class="shrine-subtitle">Visor de Movimientos Tácticos</p>
        </header>

        <aside id="controls-hud">
            <div class="engine-credits">
                Desarrollado en <a href="https://threejs.org" target="_blank">Three.js</a><br>
                Motor de <a href="https://www.mixamo.com/" target="_blank">Mixamo</a>
            </div>
            
            <h2 class="controls-title">Comandos de Combate</h2>
            
            <ul class="action-list">
                <li><span class="key-cap">W</span> Avanzar</li>
                <li><span class="key-cap">S</span> Evasión</li>
                <li><span class="key-cap wide-cap">ESPACIO</span> Salto Vertical</li>
                <li><span class="key-cap">E</span> Ofensiva</li>
                <li><span class="key-cap">A</span> Ebrio</li>
                <li class="cancel-action mt-space">
                    <span class="key-cap danger-cap">X</span> Descanso
                </li>
            </ul>
        </aside>

        <footer id="footer-hud">
            <span>Leonardo Gutiérrez</span>
            <span class="dot-separator">•</span>
            <span>Ingeniería en Sistemas</span>
        </footer>

    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "./assets/build/three.module.js",
                "three/addons/": "./assets/jsm/"
            }
        }
    </script>
    <script type="module" src="./assets/js/main.js"></script>

</body>
</html>
